<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XplainAI — Model Explainability Gap Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-brand">
        <span class="brand-icon">🔍</span>
        <div>
            <div class="brand-title">XplainAI</div>
            <div class="brand-sub">Explainability Gap Audit</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a href="{{ url_for('index') }}"
           class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
            <i class="bi bi-bar-chart-line"></i> Audit Dashboard
        </a>
        <a href="{{ url_for('analyser') }}"
           class="nav-link {% if request.endpoint == 'analyser' %}active{% endif %}">
            <i class="bi bi-person-lines-fill"></i> Employee Analyser
        </a>
        <a href="{{ url_for('advisor') }}"
           class="nav-link {% if request.endpoint == 'advisor' %}active{% endif %}">
            <i class="bi bi-lightbulb"></i> Model Advisor
        </a>
        <a href="{{ url_for('assessment') }}"
           class="nav-link {% if request.endpoint == 'assessment' %}active{% endif %}">
            <i class="bi bi-shield-check"></i> Regulatory Assessment
        </a>
    </nav>

    <div class="sidebar-footer">
        <p class="mb-1 fw-semibold" style="font-size:0.8rem;">Built against</p>
        <span class="badge-reg">RBI FREE-AI</span>
        <span class="badge-reg">EU AI Act</span>
        <hr style="border-color:#374151; margin:0.75rem 0;">
        <p style="font-size:0.75rem; color:#6b7280;">
            IBM HR Attrition Dataset<br>
            Logistic Regression · Random Forest · Neural Network
        </p>
    </div>
</div>

<!-- Main content -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
